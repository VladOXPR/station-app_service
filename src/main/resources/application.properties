spring.application.name=station-backend

# Cloud Run sets PORT automatically; default to 8080 for local dev
server.port=${PORT:8080}

# Stripe credentials come from environment variables (Secret Manager in prod).
# Defaults are empty so the container can start even when secrets are not yet
# wired up; Stripe endpoints will return 503 until a real key is configured.
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Logging
logging.level.com.yourcompany=INFO
logging.level.com.stripe=WARN

# Don't show stack traces to the client
server.error.include-stacktrace=never
server.error.include-message=always
